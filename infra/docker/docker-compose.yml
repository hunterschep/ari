services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ari
      POSTGRES_PASSWORD: ari
      POSTGRES_DB: ari
    ports:
      - "5432:5432"
    volumes:
      - ari-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://ari:ari@postgres:5432/ari
      REDIS_URL: redis://redis:6379
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

volumes:
  ari-postgres:
